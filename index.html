/* ---------- cálculo de preço de um item (com promo) ---------- */
function itemTotal(it) {
  const qty = num(it.qty);
  const price = num(it.price);
  const promoQty = num(it.promoQty);
  const promoPrice = num(it.promoPrice);
  // Promoção por quantidade mínima: comprou promoQty OU MAIS → todos pelo promoPrice
  if (promoQty > 0 && promoPrice > 0 && qty >= promoQty) {
    return qty * promoPrice;
  }
  return qty * price;
}

  const [syncing, setSyncing] = useState(false);
  const [activeList, setActiveList] = useState(null);
  const [view, setView] = useState("lists"); // lists | list | history

  const [confirmAsk, setConfirmAsk] = useState(null); // { title, message, danger, onYes }
  const [toast, setToast] = useState("");

  const lastSync = useRef("");      // última string vista do servidor
  const saveTimer = useRef(null);   // timer da gravação adiada
  const modalOpen = useRef(false);  // pausa o polling durante edição

  // mantém modalOpen atualizado conforme qualquer modal abre/fecha
  modalOpen.current = !!(editItem || showNewList || showFinish || showBudget || confirmAsk);

  /* ---- carregar do Supabase ---- */
  const load = useCallback(async () => {
    try {
      const { data: row, error } = await sb
        .from("casa_data").select("payload").eq("id", "casa_main").maybeSingle();
      if (error) throw error;
      if (row && row.payload) {
        lastSync.current = JSON.stringify(row.payload);
        setData(row.payload);
      } else {
        lastSync.current = JSON.stringify(SEED);
        setData(SEED);
        await sb.from("casa_data").upsert({ id: "casa_main", payload: SEED });
      }
    } catch (e) {
      console.error("Erro ao carregar:", e);
      setData(SEED);
    }
    setLoading(false);
  }, []);

  useEffect(() => { load(); }, [load]);

  /* ---- salvar no Supabase (gravação adiada) ---- */
  const save = useCallback((next) => {
    setData(next);
    const str = JSON.stringify(next);
    lastSync.current = str;
    clearTimeout(saveTimer.current);
    setSyncing(true);
    saveTimer.current = setTimeout(async () => {
      try { await sb.from("casa_data").upsert({ id: "casa_main", payload: next }); }

          const str = JSON.stringify(row.payload);

                  📜 Histórico ({data.history.length})
                </button>

                  <div style={{ flex: 1, minWidth: 0 }}>
                    <div style={{ fontWeight: 700, fontSize: 16, color: "#0F172A" }}>{l.name}</div>
                    <div style={{ fontSize: 12.5, color: "#94A3B8", marginTop: 2 }}>
                      {done}/{total} itens{val > 0 ? ` · ${brl(val)}` : ""}
                    </div>
                  </div>
                  <div style={{ fontSize: 20, color: "#CBD5E1" }}>›</div>
                </div>
              );
            })}
            <button onClick={() => setShowNewList(true)} style={S.addListBtn}>+ Nova lista / cômodo</button>
            <button onClick={resetModel} style={{ width: "100%", padding: "10px", borderRadius: 11, border: "none", background: "transparent", color: "#94A3B8", fontWeight: 600, fontSize: 12.5, cursor: "pointer", marginTop: 4 }}>
              ↻ Atualizar estrutura para o modelo padrão
            </button>
          </div>
        </>
      )}

      {/* ============ DETALHE DE UMA LISTA ============ */}
      {view === "list" && list && (
        <>
          <Header
            title={`${list.icon} ${list.name}`}
            subtitle={list.type === "room" ? "Compras + tarefas" : "Lista de compras"}
            onBack={() => setView("lists")}
            color={list.color}
          />
          <div style={S.container}>
            {/* orçamento ao vivo */}
            {(() => {
              const budget = num(list.budget);
              const remaining = budget - listTotal;
              const over = remaining < 0;
              const pct = budget > 0 ? Math.min((listTotal / budget) * 100, 100) : 0;
              return (
                <div style={{ ...S.totalBar, borderColor: list.color, display: "block" }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start" }}>
                    <div>
                      <div style={{ fontSize: 12, color: "#64748B" }}>Já marcado</div>
                      <div style={{ fontSize: 26, fontWeight: 800, color: list.color }}>{brl(listTotal)}</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontSize: 12, color: "#64748B" }}>Orçamento</div>
                      <button onClick={() => setShowBudget(true)}
                        style={{ border: "none", background: "none", fontSize: 16, fontWeight: 700, color: budget > 0 ? "#0F172A" : "#94A3B8", cursor: "pointer", padding: 0, textDecoration: "underline", textDecorationStyle: "dotted" }}>
                        {budget > 0 ? brl(budget) : "definir"}
                      </button>
                    </div>
                  </div>
                  {budget > 0 && (
                    <>
                      <div style={{ background: "#E2E8F0", borderRadius: 99, height: 8, marginTop: 12, overflow: "hidden" }}>
                        <div style={{ height: 8, borderRadius: 99, width: `${pct}%`, background: over ? "#DC2626" : list.color, transition: "width 0.3s" }} />
                      </div>
                      <div style={{ marginTop: 8, fontSize: 14, fontWeight: 700, color: over ? "#DC2626" : "#16A34A", textAlign: "center" }}>
                        {over ? `Passou ${brl(Math.abs(remaining))} do orçamento` : `Ainda pode gastar ${brl(remaining)}`}
                      </div>
                    </>
                  )}
                </div>
              );
            })()}

            {/* filtros */}
            <div style={{ display: "flex", gap: 6, margin: "4px 0 12px" }}>
              {[["all", "Todos"], ["pending", "Pendentes"], ["done", "Marcados"]].map(([k, lbl]) => (
                <button key={k} onClick={() => setFilter(k)}
                  style={{ ...S.filterBtn, ...(filter === k ? { background: list.color, color: "#fff", borderColor: list.color } : {}) }}>
                  {lbl}
                </button>
              ))}
            </div>

            {/* itens agrupados por área */}
            {(() => {
              const visible = list.items.filter((i) => filter === "all" ? true : filter === "done" ? i.done : !i.done);
              // ordem das áreas: as definidas na lista + qualquer área extra que apareça
              const defined = list.areas || [];
              const extra = [...new Set(visible.map((i) => i.area).filter((a) => a && !defined.includes(a)))];
              const order = [...defined, ...extra, "__none__"];
              return order.map((area) => {
                const group = visible.filter((i) => (i.area || "__none__") === area);
                if (group.length === 0) return null;
                const label = area === "__none__" ? "Outros" : area;
                const groupDone = group.filter((i) => i.done).length;
                return (
                  <div key={area} style={{ marginBottom: 18 }}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", margin: "2px 4px 8px" }}>
                      <span style={{ fontSize: 13, fontWeight: 800, color: list.color, textTransform: "uppercase", letterSpacing: 0.5 }}>{label}</span>
                      <span style={{ fontSize: 11.5, fontWeight: 700, color: "#fff", background: list.color, borderRadius: 99, padding: "2px 9px" }}>{groupDone}/{group.length}</span>
                    </div>
                    {group.map((it) => {
                      const t = itemTotal(it);
                      const isTask = it.kind === "task";
                      return (
                        <div key={it.id} style={{ ...S.item, background: it.done ? "#F8FAFC" : "#fff" }}>
                          <div onClick={() => toggleItem(it.id)}
                            style={{ ...S.check, borderColor: it.done ? list.color : "#CBD5E1", background: it.done ? list.color : "#fff" }}>
                            {it.done && <span style={{ color: "#fff", fontSize: 13, fontWeight: 800 }}>✓</span>}
                          </div>
                          <div onClick={() => setEditItem({ ...it })} style={{ flex: 1, minWidth: 0, marginLeft: 12, cursor: "pointer" }}>
                            <div style={{ fontSize: 15, fontWeight: 600, color: it.done ? "#94A3B8" : "#0F172A", textDecoration: it.done ? "line-through" : "none" }}>
                              {isTask && "🔧 "}{it.name}
                            </div>
                            <div style={{ fontSize: 12, color: "#94A3B8", marginTop: 1 }}>
                              {!isTask && it.qty ? `${it.qty} ${it.unit}` : ""}
                              {it.promoQty > 0 && it.promoPrice > 0 ? ` · 🏷️ ${it.promoQty}+ a ${brl(it.promoPrice)}` : ""}
                              {num(it.parcels) > 0 && num(it.price) > 0 ? ` · 💳 ${Math.round(num(it.parcels))}x de ${brl((num(it.price) * num(it.qty)) / num(it.parcels))}` : ""}
                              {it.note ? `${(!isTask && it.qty) || it.promoQty || num(it.parcels) > 0 ? " · " : ""}${it.note}` : ""}
                            </div>
                          </div>
                          {!isTask && t > 0 && (
                            <div style={{ ...S.priceTag, background: BGS[list.color], color: list.color }}>{brl(t)}</div>
                          )}
                        </div>
                      );
                    })}
                  </div>
                );
              });
            })()}

            <button onClick={() => setEditItem({ _new: true, name: "", qty: 1, unit: "un", note: "", area: (list.areas && list.areas[0]) || "", price: 0, promoQty: 0, promoPrice: 0, parcels: 0, done: false, kind: "buy" })}
              style={{ ...S.addListBtn, borderColor: list.color, color: list.color }}>
              + Adicionar item
            </button>

            {list.items.some((i) => i.done) && (
              <button onClick={() => setShowFinish(true)} style={{ ...S.finishBtn, background: list.color }}>
                ✅ Finalizar compra ({brl(listTotal)})
              </button>
            )}

            <button onClick={() => setConfirmAsk({
                title: "Excluir esta lista?",
                message: `A lista "${list.name}" e todos os seus itens serão removidos. Esta ação não pode ser desfeita.`,
                danger: true,
                onYes: () => deleteList(list.id),
              })}
              style={S.deleteListBtn}>Excluir esta lista</button>
          </div>
        </>
      )}

      {/* ============ HISTÓRICO ============ */}
      {view === "history" && (
        <>
          <Header title="📜 Histórico" subtitle="Compras finalizadas" onBack={() => setView("lists")} />
          <div style={S.container}>
            {data.history.length === 0 ? (
              <div style={{ textAlign: "center", padding: "60px 0", color: "#94A3B8" }}>
                <div style={{ fontSize: 44, marginBottom: 10 }}>🗒️</div>
                Nenhuma compra finalizada ainda.
              </div>
            ) : (
              <>
                <div style={{ ...S.totalBar, borderColor: "#10B981", marginBottom: 16 }}>
                  <div>
                    <div style={{ fontSize: 12, color: "#64748B" }}>Total gasto (histórico)</div>
                    <div style={{ fontSize: 24, fontWeight: 800, color: "#10B981" }}>
                      {brl(data.history.reduce((a, h) => a + (h.paid != null ? h.paid : h.total), 0))}
                    </div>
                  </div>
                  <div style={{ fontSize: 13, color: "#94A3B8" }}>{data.history.length} compras</div>
                </div>
                {data.history.map((h) => (
                  <div key={h.id} style={S.histCard}>
                    <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                      <div style={{ fontWeight: 700, fontSize: 15 }}>{h.icon} {h.listName}</div>
                      <div style={{ textAlign: "right" }}>
                        <div style={{ fontWeight: 800, color: "#10B981" }}>{brl(h.paid != null ? h.paid : h.total)}</div>
                        {h.paid != null && (
                          <div style={{ fontSize: 11, color: "#94A3B8" }}>estimado {brl(h.total)}</div>
                        )}
                      </div>
                    </div>
                    <div style={{ fontSize: 12, color: "#94A3B8", marginBottom: 8 }}>
                      {new Date(h.date).toLocaleDateString("pt-BR", { day: "2-digit", month: "long", year: "numeric", hour: "2-digit", minute: "2-digit" })}
                    </div>
                    <div style={{ fontSize: 13, color: "#475569", lineHeight: 1.7 }}>
                      {h.items.map((i, x) => (
                        <div key={x} style={{ display: "flex", justifyContent: "space-between" }}>
                          <span>{i.name} {i.qty ? `(${i.qty} ${i.unit})` : ""}</span>
                          <span style={{ color: "#94A3B8" }}>{i.total > 0 ? brl(i.total) : "—"}</span>
                        </div>
                      ))}
                    </div>
                  </div>
                ))}
              </>
            )}
          </div>
        </>
      )}

      {/* ============ MODAL: editar/criar item ============ */}
      {editItem && (
        <ItemModal
          item={editItem}
          color={list ? list.color : "#3B82F6"}
          isRoom={list && list.type === "room"}
          feature={(list && list.feature) || "promo"}
          areas={(list && list.areas) || []}
          onClose={() => setEditItem(null)}
          onSave={saveItem}
          onDelete={!editItem._new ? () => deleteItem(editItem.id) : null}
        />
      )}

      {/* ============ MODAL: nova lista ============ */}
      {showNewList && <NewListModal onClose={() => setShowNewList(false)} onCreate={addList} />}

      {/* ============ MODAL: orçamento ============ */}
      {showBudget && list && (
        <BudgetModal current={list.budget} color={list.color} onClose={() => setShowBudget(false)} onSave={setBudget} />
      )}

      {/* ============ MODAL: confirmar finalizar ============ */}
      {showFinish && list && (
        <FinishModal
          count={list.items.filter((i) => i.done).length}
          estimated={listTotal}
          onClose={() => setShowFinish(false)}
          onConfirm={finishShopping}
        />
      )}

      {/* ============ MODAL: confirmação genérica ============ */}
      {confirmAsk && (
        <ConfirmModal
          info={confirmAsk}
          onClose={() => setConfirmAsk(null)}
          onYes={() => { confirmAsk.onYes(); setConfirmAsk(null); }}
        />
      )}

      {/* toast */}
      {toast && <div style={S.toast}>{toast}</div>}
    </div>
  );
}

/* ================= COMPONENTES ================= */
function Header({ title, subtitle, onBack, color }) {
  return (
    <div style={{ ...S.header, background: color ? `linear-gradient(135deg, ${color} 0%, #0F172A 160%)` : "linear-gradient(135deg, #1E3A5F 0%, #2563EB 100%)" }}>
      <div style={{ maxWidth: 480, margin: "0 auto" }}>
        {onBack && (
          <button onClick={onBack} style={S.backBtn}>‹ Voltar</button>
        )}
        <h1 style={{ margin: "8px 0 2px", fontSize: 24, fontWeight: 800, letterSpacing: -0.5 }}>{title}</h1>
        <div style={{ fontSize: 13, opacity: 0.8 }}>{subtitle}</div>
      </div>
    </div>
  );
}

function SegBtns({ extra }) {
  return <div style={{ display: "flex", justifyContent: "flex-end", marginBottom: 8 }}>{extra}</div>;
}

function ItemModal({ item, color, isRoom, feature, areas, onClose, onSave, onDelete }) {
  const [f, setF] = useState(item);
  const set = (k, v) => setF((p) => ({ ...p, [k]: v }));
  const isTask = f.kind === "task";
  const preview = itemTotal(f);

  return (
    <Modal onClose={onClose}>
      <h3 style={{ margin: "0 0 14px", fontSize: 18 }}>{item._new ? "Novo item" : "Editar item"}</h3>

      {areas && areas.length > 0 && (
        <Field label={isRoom ? "Cômodo" : "Área"}>
          <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
            {areas.map((a) => (
              <button key={a} onClick={() => set("area", a)}
                style={{ padding: "7px 12px", borderRadius: 99, fontSize: 13, fontWeight: 600, cursor: "pointer",
                  border: f.area === a ? `2px solid ${color}` : "1px solid #E2E8F0",
                  background: f.area === a ? color : "#fff", color: f.area === a ? "#fff" : "#475569" }}>{a}</button>
            ))}
          </div>
        </Field>
      )}

      {isRoom && (
        <div style={{ display: "flex", gap: 8, marginBottom: 14 }}>
          {[["buy", "🛒 Compra"], ["task", "🔧 Tarefa"]].map(([k, lbl]) => (
            <button key={k} onClick={() => set("kind", k)}
              style={{ ...S.filterBtn, flex: 1, ...(f.kind === k ? { background: color, color: "#fff", borderColor: color } : {}) }}>{lbl}</button>
          ))}
        </div>
      )}

      <Field label="Nome">
        <input style={S.input} value={f.name} onChange={(e) => set("name", e.target.value)} placeholder="Ex: Arroz" autoFocus />
      </Field>

      {!isTask && (
        <>
          <div style={{ display: "flex", gap: 10 }}>
            <Field label="Quantidade" flex>
              <input style={S.input} type="number" inputMode="decimal" value={f.qty} onChange={(e) => set("qty", e.target.value)} />
            </Field>
            <Field label="Unidade" flex>
              <input style={S.input} value={f.unit} onChange={(e) => set("unit", e.target.value)} placeholder="un, kg, pct" />
            </Field>
          </div>

          <Field label="Preço unitário (R$)">
            <input style={S.input} type="number" inputMode="decimal" value={f.price} onChange={(e) => set("price", e.target.value)} placeholder="0,00" />
          </Field>

          {/* MERCADO: Promoção por quantidade mínima */}
          {feature === "promo" && (
            <>
              <div style={{ background: "#FEF3C7", borderRadius: 12, padding: 12, margin: "4px 0 12px" }}>
                <div style={{ fontSize: 13, fontWeight: 700, color: "#92400E", marginBottom: 8 }}>🏷️ Preço promocional por quantidade (opcional)</div>
                <div style={{ display: "flex", gap: 10, alignItems: "flex-end" }}>
                  <Field label="A partir de (qtd)" flex small>
                    <input style={S.input} type="number" inputMode="decimal" value={f.promoQty} onChange={(e) => set("promoQty", e.target.value)} placeholder="10" />
                  </Field>
                  <span style={{ paddingBottom: 12, color: "#92400E" }}>→</span>
                  <Field label="Preço da unidade (R$)" flex small>
                    <input style={S.input} type="number" inputMode="decimal" value={f.promoPrice} onChange={(e) => set("promoPrice", e.target.value)} placeholder="3,29" />
                  </Field>
                </div>
                <div style={{ fontSize: 11.5, color: "#92400E", marginTop: 6, opacity: 0.8 }}>
                  Ex: a partir de 10 un, cada uma sai por 3,29 (abaixo disso, usa o preço unitário acima).
                </div>
              </div>
              {num(f.promoQty) > 0 && num(f.promoPrice) > 0 && (
                <div style={{ textAlign: "center", fontSize: 12.5, fontWeight: 600, color: num(f.qty) >= num(f.promoQty) ? "#16A34A" : "#94A3B8", marginBottom: 4 }}>
                  {num(f.qty) >= num(f.promoQty)
                    ? `✅ Promoção aplicada (${f.qty} ≥ ${f.promoQty} un)`
                    : `Faltam ${num(f.promoQty) - num(f.qty)} un para o preço promocional`}
                </div>
              )}
            </>
          )}

          {/* CASA: Parcelamento */}
          {feature === "installment" && (
            <div style={{ background: "#EDE9FE", borderRadius: 12, padding: 12, margin: "4px 0 12px" }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 8 }}>
                <span style={{ fontSize: 13, fontWeight: 700, color: "#5B21B6" }}>💳 Parcelado?</span>
                <button onClick={() => set("parcels", num(f.parcels) > 0 ? 0 : 2)}
                  style={{ border: "none", borderRadius: 99, padding: "5px 14px", fontSize: 13, fontWeight: 700, cursor: "pointer",
                    background: num(f.parcels) > 0 ? "#7C3AED" : "#fff", color: num(f.parcels) > 0 ? "#fff" : "#7C3AED", boxShadow: "0 0 0 1px #DDD6FE" }}>
                  {num(f.parcels) > 0 ? "Sim" : "Não / à vista"}
                </button>
              </div>
              {num(f.parcels) > 0 && (
                <>
                  <Field label="Em quantas vezes?" small>
                    <input style={S.input} type="number" inputMode="numeric" value={f.parcels} onChange={(e) => set("parcels", e.target.value)} placeholder="12" />
                  </Field>
                  <div style={{ fontSize: 12.5, color: "#5B21B6", marginTop: 4, textAlign: "center", fontWeight: 600 }}>
                    {num(f.parcels) >= 1 && num(f.price) > 0
                      ? `${brl(num(f.price) * num(f.qty))} em ${Math.round(num(f.parcels))}x de ${brl((num(f.price) * num(f.qty)) / num(f.parcels))}`
                      : "Preencha o preço acima para ver a parcela"}
                  </div>
                </>
              )}
            </div>
          )}

          <div style={{ textAlign: "center", padding: "8px 0", fontSize: 15, fontWeight: 700, color }}>
            Subtotal: {brl(preview)}
          </div>
        </>
      )}

      <Field label="Observação">
        <input style={S.input} value={f.note} onChange={(e) => set("note", e.target.value)} placeholder="Atacado, marca, etc." />
      </Field>

      <div style={{ display: "flex", gap: 8, marginTop: 8 }}>
        {onDelete && <button onClick={onDelete} style={S.btnDanger}>Excluir</button>}
        <button onClick={onClose} style={S.btnSecondary}>Cancelar</button>
        <button onClick={() => f.name.trim() && onSave(f)} style={{ ...S.btnPrimary, background: color }}>Salvar</button>
      </div>
    </Modal>
  );
}

function ConfirmModal({ info, onClose, onYes }) {
  return (
    <Modal onClose={onClose}>
      <h3 style={{ margin: "0 0 6px", fontSize: 18 }}>{info.title}</h3>
      <p style={{ color: "#64748B", fontSize: 14, margin: "0 0 18px", lineHeight: 1.5 }}>{info.message}</p>
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onClose} style={S.btnSecondary}>Cancelar</button>
        <button onClick={onYes} style={{ ...S.btnPrimary, background: info.danger ? "#DC2626" : "#10B981" }}>
          {info.danger ? "Excluir" : "Confirmar"}
        </button>
      </div>
    </Modal>
  );
}

function BudgetModal({ current, color, onClose, onSave }) {
  const [v, setV] = useState(current > 0 ? String(current) : "");
  return (
    <Modal onClose={onClose}>
      <h3 style={{ margin: "0 0 6px", fontSize: 18 }}>Orçamento da compra</h3>
      <p style={{ color: "#64748B", fontSize: 14, margin: "0 0 14px" }}>
        Quanto você quer gastar nesta lista? O app vai mostrar o saldo conforme você marca os itens.
      </p>
      <Field label="Valor do orçamento (R$)">
        <input style={S.input} type="number" inputMode="decimal" value={v} onChange={(e) => setV(e.target.value)} placeholder="Ex: 1000,00" autoFocus />
      </Field>
      <div style={{ display: "flex", gap: 8, marginTop: 6 }}>
        {current > 0 && <button onClick={() => onSave(0)} style={S.btnDanger}>Remover</button>}
        <button onClick={onClose} style={S.btnSecondary}>Cancelar</button>
        <button onClick={() => onSave(v)} style={{ ...S.btnPrimary, background: color }}>Salvar</button>
      </div>
    </Modal>
  );
}

function FinishModal({ count, estimated, onClose, onConfirm }) {
  const [paid, setPaid] = useState("");
  const diff = num(paid) - estimated;
  return (
    <Modal onClose={onClose}>
      <h3 style={{ margin: "0 0 6px", fontSize: 18 }}>Finalizar compra?</h3>
      <p style={{ color: "#64748B", fontSize: 14, margin: "0 0 14px" }}>
        {count} itens marcados serão salvos no histórico. A lista será reiniciada pra próxima vez.
      </p>
      <div style={{ background: "#F1F5F9", borderRadius: 10, padding: "10px 14px", marginBottom: 14, display: "flex", justifyContent: "space-between" }}>
        <span style={{ color: "#64748B", fontSize: 14 }}>Total estimado</span>
        <strong style={{ color: "#0F172A" }}>{brl(estimated)}</strong>
      </div>
      <Field label="Quanto você pagou de verdade? (opcional)">
        <input style={S.input} type="number" inputMode="decimal" value={paid} onChange={(e) => setPaid(e.target.value)} placeholder="Ex: 950,00" autoFocus />
      </Field>
      {num(paid) > 0 && (
        <div style={{ textAlign: "center", fontSize: 13, fontWeight: 600, marginBottom: 10, color: diff <= 0 ? "#16A34A" : "#DC2626" }}>
          {diff === 0 ? "Bateu certinho com o estimado" : diff < 0 ? `Economizou ${brl(Math.abs(diff))} 🎉` : `Passou ${brl(diff)} do estimado`}
        </div>
      )}
      <div style={{ display: "flex", gap: 8 }}>
        <button onClick={onClose} style={S.btnSecondary}>Cancelar</button>
        <button onClick={() => onConfirm(paid)} style={{ ...S.btnPrimary, background: "#10B981" }}>Confirmar</button>
      </div>
    </Modal>
  );
}

function NewListModal({ onClose, onCreate }) {
  const [name, setName] = useState("");
  const [icon, setIcon] = useState("📦");
  const [color, setColor] = useState("#3B82F6");
  const [areasText, setAreasText] = useState("");
  return (
    <Modal onClose={onClose}>
      <h3 style={{ margin: "0 0 14px", fontSize: 18 }}>Nova lista / cômodo</h3>
      <Field label="Nome"><input style={S.input} value={name} onChange={(e) => setName(e.target.value)} placeholder="Ex: Sala, Quarto, Farmácia" autoFocus /></Field>
      <Field label="Áreas / divisões (separe por vírgula — opcional)">
        <input style={S.input} value={areasText} onChange={(e) => setAreasText(e.target.value)} placeholder="Ex: Armário, Geladeira, Limpeza" />
      </Field>
      <Field label="Ícone">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 6 }}>
          {ICONS.map((ic) => (
            <button key={ic} onClick={() => setIcon(ic)} style={{ fontSize: 20, width: 40, height: 40, borderRadius: 10, border: icon === ic ? "2px solid #2563EB" : "1px solid #E2E8F0", background: icon === ic ? "#DBEAFE" : "#fff", cursor: "pointer" }}>{ic}</button>
          ))}
        </div>
      </Field>
      <Field label="Cor">
        <div style={{ display: "flex", flexWrap: "wrap", gap: 8 }}>
          {COLORS.map((c) => (
            <button key={c} onClick={() => setColor(c)} style={{ width: 34, height: 34, borderRadius: 99, background: c, border: color === c ? "3px solid #0F172A" : "2px solid #fff", boxShadow: "0 0 0 1px #E2E8F0", cursor: "pointer" }} />
          ))}
        </div>
      </Field>
      <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
        <button onClick={onClose} style={S.btnSecondary}>Cancelar</button>
        <button onClick={() => name.trim() && onCreate(name, icon, color, areasText.split(",").map((a) => a.trim()).filter(Boolean))} style={{ ...S.btnPrimary, background: color }}>Criar</button>
      </div>
    </Modal>
  );
}

function Modal({ children, onClose }) {
  return (
    <div onClick={onClose} style={S.overlay}>
      <div onClick={(e) => e.stopPropagation()} style={S.modal}>{children}</div>
    </div>
  );
}

function Field({ label, children, flex, small }) {
  return (
    <div style={{ marginBottom: 12, flex: flex ? 1 : undefined }}>
      <label style={{ display: "block", fontSize: small ? 11 : 12.5, fontWeight: 600, color: "#64748B", marginBottom: 5 }}>{label}</label>
      {children}
    </div>
  );
}
